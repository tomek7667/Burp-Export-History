name: Build and Release JAR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build JAR
        run: ./gradlew clean jar

      - name: Get JAR name
        id: jar
        run: |
          JAR_FILE=$(find build/libs -maxdepth 1 -name "*.jar" | head -n 1)
          echo "path=$JAR_FILE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$JAR_FILE")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload JAR
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.path }}
